# Backend & Performance
backend = "glx";
use-damage = true;
vsync = true;

glx-no-stencil = true;
glx-no-rebind-pixmap = true;

# Shadows - deep green tint lifts windows off the wallpaper
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.92;
shadow-offset-x = -8;
shadow-offset-y = -8;

shadow-red   = 0.031;
shadow-green = 0.224;
shadow-blue  = 0.020;

shadow-exclude = [
  "class_g = 'i3-frame'",
  "_GTK_FRAME_EXTENTS@:c",
  "class_g = 'Dunst'",
  "class_g ?= 'Notification'",
  "class_g = 'Plank'",
  "class_g = 'Docky'",
  "class_g = 'Kupfer'",
  "class_g = 'xfce4-notifyd'",
  "class_g ?= 'notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'Conky'"
];

transparent-clipping = true;

unredir-if-possible = true;
detect-rounded-corners = false;
use-ewmh-active-win = true;
detect-client-opacity = true;

# Blur wallpaper behind semi-transparent windows
blur-method = "dual_kawase";
blur-strength = 6;
blur-background = true;
blur-background-frame = false;
blur-background-fixed = true;

blur-background-exclude = [
  "window_type = 'dock'",
  "class_g = 'i3bar'",
  "class_g = 'Dunst'",
  "class_g ?= 'Notification'",
  "class_g = 'Rofi'",
  "name = 'rofi'",
  "fullscreen",
  "class_g = 'vlc'",
  "class_g = 'mpv'",
  "class_g = 'Steam'",
  "class_g = 'steam_app'",
  "class_g = 'steamwebhelper'",
  "class_g = 'Wine'",
  "class_g ?= 'gamescope'",
  "class_g = 'VirtualBox'",
  "class_g = 'VirtualBox Machine'",
  "class_g = 'obs'",
  "class_g = 'zoom'",
  "class_g = 'firefox'",
  "class_g = 'Google-chrome'",
  "class_g = 'chromium'",
  "class_g = 'Chromium'"
];

# Default opaque — only clients that set their own opacity (e.g. kitty) go translucent
active-opacity = 1.0;
inactive-opacity = 1.0;
frame-opacity = 1.0;

opacity-rule = [
  "100:class_g = 'i3bar'",
  "100:class_g = 'Polybar'",
  "100:class_g = 'Dunst'",
  "100:class_g ?= 'Notification'",
  "100:class_g = 'Rofi'",
  "100:name = 'rofi'",
  "100:class_g = 'dmenu'",
  "100:class_g = 'copyq'",
  "100:class_g = 'Pavucontrol'",
  "100:class_g = 'Galculator'",
  "100:class_g = 'swappy'",
  "100:class_g = 'normcap'",
  "100:class_g = 'kooha'",
  "100:class_g = 'Oblogout'",
  "100:class_g = 'Xfce4-notifyd'",
  "100:class_g = 'xfce4-notifyd'",
  "100:fullscreen",
  "100:class_g = 'vlc'",
  "100:class_g = 'mpv'",
  "100:class_g = 'Steam'",
  "100:class_g = 'steam_app'",
  "100:class_g = 'steamwebhelper'",
  "100:class_g = 'Wine'",
  "100:class_g ?= 'gamescope'",
  "100:class_g = 'VirtualBox'",
  "100:class_g = 'VirtualBox Machine'",
  "100:class_g = 'obs'",
  "100:class_g = 'zoom'",
  "100:class_g = 'firefox'",
  "100:class_g = 'Google-chrome'",
  "100:class_g = 'chromium'",
  "100:class_g = 'Chromium'"
];

fading = false;
