# Backend & Performance
backend = "glx";
# Only redraw parts of the screen that have changed (Crucial for CPU)
use-damage = true;
# Prevent stuttering/tearing by syncing with monitor refresh rate
vsync = true;

# GLX Backend Optimizations
# Avoids using a stencil buffer; can boost performance by ~15%
glx-no-stencil = true;
# Avoids rebinding pixmaps on window damage (check for stability on your driver)
glx-no-rebind-pixmap = true;

# Shadows
shadow = true;
shadow-radius = 10;
shadow-opacity = 0.85;
shadow-offset-x = -5;
shadow-offset-y = -5;

# Custom Shadow Color (Hipster Green #083905)
shadow-red   = 0.031;
shadow-green = 0.224;
shadow-blue  = 0.020;

# Exclude shadows from i3 frames to prevent double-shadowing
shadow-exclude = [
  "class_g = 'i3-frame'",
  "_GTK_FRAME_EXTENTS@:c"
];


transparent-clipping = true

# Advanced Window Handling
# Unredirect fullscreen windows (boosts gaming/video performance)
unredir-if-possible = true;
# Detect windows with rounded corners to avoid rendering shadows behind them
detect-rounded-corners = true;
# Use EWMH to determine which window is focused (more reliable)
use-ewmh-active-win = true;

shadow-exclude = [ "class_g = 'i3-frame'" ];

blur:
{
	method = "dual_kawase";
	strength = 1;
};

active-opacity = 1.0
inactive-opacity = 1.0

frame-opacity = 1.0

corner-radius = 10
round-borders = 0
