# Portal backend selection for sway (matched via XDG_CURRENT_DESKTOP).
# Without this, xdg-desktop-portal on Ubuntu 24.04 never exposes the
# ScreenCast interface under sway, so OBS lacks "Screen Capture (PipeWire)".
[preferred]
default=gtk
org.freedesktop.impl.portal.ScreenCast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
