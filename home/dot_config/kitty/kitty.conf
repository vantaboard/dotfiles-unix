# BEGIN_KITTY_THEME
# Hipster Green
include current-theme.conf
# END_KITTY_THEME

paste-actions no-op

cursor_trail 1
cursor_trail_decay 0.1 0.2
cursor_trail_start_threshold 8

input_delay 0
repaint_delay 2
sync_to_monitor no
wayland_enable_ime no

shell_integration no-cursor
cursor_shape block

window_padding_width 0
window_margin_width 5

# Let kitty handle terminal transparency; picom only shadows the window frame.
background_opacity 0.92
dynamic_background_opacity yes
inactive_text_alpha 0.85

confirm_os_window_close 0

font_size 10.0

enable_audio_bell no

# BEGIN_KITTY_FONTS
font_family      family="FixedsysExcelsior Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
