# sway-session chooses WLR_DRM_DEVICES dynamically:
# - docked: NVIDIA only, avoiding wlroots multi-GPU scanout instability
# - undocked: Intel only, preserving laptop-panel behavior and battery life
WLR_NO_HARDWARE_CURSORS=1

# Improve Wayland compatibility for common apps.
MOZ_ENABLE_WAYLAND=1
QT_QPA_PLATFORM=wayland
# Prefer XWayland for Electron apps that honor this hint. Sway 1.9 lacks
# linux-drm-syncobj-v1 (explicit sync, added in Sway 1.11), so native-Wayland
# Electron on NVIDIA corrupts scanout buffers session-wide. Cursor ignores
# this hint and is forced to XWayland via its .desktop override instead.
# Revert to "auto" once running Sway >= 1.11.
ELECTRON_OZONE_PLATFORM_HINT=x11
XDG_CURRENT_DESKTOP=sway
XDG_SESSION_DESKTOP=sway
