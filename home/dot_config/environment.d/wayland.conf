# sway-session sets WLR_DRM_DEVICES to NVIDIA:Intel (resolved by driver name —
# card numbers are not boot-stable) so dock hotplug works live; Intel-only is
# the fallback when NVIDIA is absent.
WLR_NO_HARDWARE_CURSORS=1

# Client-side cursors on Wayland: apps load shapes from XCursor. Set theme and
# size here for native Wayland clients; seat xcursor_theme covers Sway/XWayland.
XCURSOR_THEME=Adwaita
XCURSOR_SIZE=24

# Improve Wayland compatibility for common apps.
MOZ_ENABLE_WAYLAND=1
QT_QPA_PLATFORM=wayland
ELECTRON_OZONE_PLATFORM_HINT=auto
XDG_CURRENT_DESKTOP=sway
XDG_SESSION_DESKTOP=sway
