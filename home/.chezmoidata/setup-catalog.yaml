# Source of truth for scripts/dotfiles-setup. Maps feature ids to packages, externals, and config blocks.
setup_catalog:
  categories:
    - id: shell_core
      label: Core shell
      description: Essential CLI tools (always enabled)
      required: true
      default: true
    - id: shell_extras
      label: Shell extras
      description: zoxide, eza, bat, vivid, mise toolchain
      default: true
    - id: zsh_stack
      label: Zsh plugins and externals
      description: Oh My Zsh, Powerlevel10k, fzf-tab, abbreviations
      default: true
    - id: desktop
      label: Desktop / Sway
      description: Sway, kitty, kanshi, waybar, display tooling
      default: true
    - id: dev
      label: Development
      description: Neovim, gh, glab, docker, clang
      default: true
    - id: system
      label: System services
      description: SSH hardening, GRUB, udev, systemd units
      default: true

  features:
    # --- shell_core (required) ---
    zsh:
      category: shell_core
      label: Zsh
      default: true
      required: true
      packages: [zsh]
    git:
      category: shell_core
      label: Git
      default: true
      required: true
      packages: [git]
    fzf:
      category: shell_core
      label: fzf
      default: true
      packages: [fzf]
      external: .fzf
      zshrc_bundle: fzf.zsh
      description: Git external for shell integration; run_after_install-fzf syncs ~/.fzf/bin with the repo
    ripgrep:
      category: shell_core
      label: ripgrep
      default: true
      packages: [ripgrep]
    fd:
      category: shell_core
      label: fd-find
      default: true
      packages: [fd-find]
    trash_cli:
      category: shell_core
      label: trash-cli
      default: true
      install_tools: true
      packages: [python3-venv]
      description: Git clone + Python venv; trash-* wrappers in ~/.local/bin
    wl_clipboard:
      category: shell_core
      label: wl-clipboard
      default: true
      packages: [wl-clipboard]
    keychain:
      category: shell_core
      label: keychain
      default: true
      packages: [keychain]
    jq:
      category: shell_core
      label: jq
      default: true
      packages: [jq]
    htop:
      category: shell_core
      label: htop
      default: true
      packages: [htop]
    fastfetch:
      category: shell_core
      label: fastfetch
      default: true
      packages: [fastfetch]
    tmux:
      category: shell_core
      label: tmux
      default: true
      packages: [tmux]

    # --- shell_extras ---
    zoxide:
      category: shell_extras
      label: zoxide
      description: Smarter cd (apt or cargo)
      default: true
      packages: [zoxide]
      zshrc_block: zoxide
    eza:
      category: shell_extras
      label: eza
      default: true
      packages: [eza]
    bat:
      category: shell_extras
      label: bat
      default: true
      packages: [bat]
    vivid:
      category: shell_extras
      label: vivid
      description: LS_COLORS via vivid dracula; .deb on Linux, pkg on Termux (install-tools)
      default: true
      export_block: vivid
      install_tools: true
    mise:
      category: shell_extras
      label: mise
      description: Runtime version manager (Termux pkg on Android; mise.run on Linux)
      default: true
      install_tools: true
      zshrc_block: mise
    direnv:
      category: shell_extras
      label: direnv
      default: true
      packages: [direnv]

    # --- zsh_stack ---
    oh_my_zsh:
      category: zsh_stack
      label: Oh My Zsh
      default: true
      external: .oh-my-zsh
      zshrc_block: oh_my_zsh
    p10k:
      category: zsh_stack
      label: Powerlevel10k
      default: true
      requires: [oh_my_zsh]
      external: .oh-my-zsh/custom/themes/powerlevel10k
      zshrc_block: p10k
    zsh_autosuggestions:
      category: zsh_stack
      label: zsh-autosuggestions
      default: true
      requires: [oh_my_zsh]
      external: .oh-my-zsh/custom/plugins/zsh-autosuggestions
      omz_plugin: zsh-autosuggestions
    zsh_completions:
      category: zsh_stack
      label: zsh-completions
      default: true
      requires: [oh_my_zsh]
      external: .oh-my-zsh/custom/plugins/zsh-completions
      zshrc_block: zsh_completions
    zsh_edit:
      category: zsh_stack
      label: zsh-edit
      default: true
      requires: [oh_my_zsh]
      external: .zshplugins/zsh-edit
      zshrc_block: zsh_edit
    fzf_tab:
      category: zsh_stack
      label: fzf-tab
      default: true
      requires: [fzf, oh_my_zsh]
      zshrc_block: fzf_tab
      install_tools: true
      description: Installed into OMZ custom/plugins via run_onchange_after_install-tools; must load last in OMZ plugins=()
    zsh_abbr:
      category: zsh_stack
      label: zsh-abbr
      default: true
      requires: [oh_my_zsh]
      zshrc_block: zsh_abbr
      install_tools: true
      description: Installed via run_onchange_after_install-tools; abbreviations in ~/.config/zsh-abbr/user-abbreviations
    omz_git:
      category: zsh_stack
      label: OMZ git plugin
      default: true
      requires: [oh_my_zsh]
      omz_plugin: git
    omz_fzf:
      category: zsh_stack
      label: OMZ fzf plugin
      default: false
      requires: [oh_my_zsh, fzf]
      omz_plugin: fzf
      description: Optional; redundant/conflicts with fzf-tab when using git-installed fzf (~/.fzf)
    omz_ssh_agent:
      category: zsh_stack
      label: OMZ ssh-agent plugin
      default: true
      requires: [oh_my_zsh]
      omz_plugin: ssh-agent
    omz_python:
      category: zsh_stack
      label: OMZ python plugin
      default: true
      requires: [oh_my_zsh]
      omz_plugin: python
    omz_virtualenv:
      category: zsh_stack
      label: OMZ virtualenv plugin
      default: true
      requires: [oh_my_zsh]
      omz_plugin: virtualenv
    omz_extract:
      category: zsh_stack
      label: OMZ extract plugin
      default: true
      requires: [oh_my_zsh]
      omz_plugin: extract
    omz_codeclimate:
      category: zsh_stack
      label: OMZ codeclimate plugin
      default: true
      requires: [oh_my_zsh]
      omz_plugin: codeclimate
    gpg_signing:
      category: zsh_stack
      label: GPG signing via keychain
      default: true
      requires: [keychain]
      packages: [pinentry-curses, pinentry-gnome3]
      config_paths: [private_dot_gnupg]
      zshrc_block: gpg_keychain

    # --- desktop ---
    desktop_sway:
      category: desktop
      label: Sway window manager
      default: true
      packages: [sway, swaylock, swayidle, swaybg, waybar, grim, slurp, wl-clipboard, py3status]
      config_paths: [dot_config/sway, dot_config/swaylock, dot_config/waybar, dot_config/environment.d/wayland.conf, dot_config/py3status]
      system_deploy: sway_session
    hyprpicker:
      category: desktop
      label: hyprpicker
      description: Wayland color picker; built from hyprwm/hyprpicker v0.3.0 into ~/.local/bin (gcc-14 on Ubuntu 24.04)
      default: true
      requires: [desktop_sway]
      install_tools: true
      packages:
        - cmake
        - pkg-config
        - libpango1.0-dev
        - libcairo2-dev
        - libwayland-dev
        - wayland-protocols
        - libxkbcommon-dev
        - libjpeg-dev
        - gcc-14
        - g++-14
    swayfx:
      category: desktop
      label: SwayFX compositor
      description: Sway fork with blur and drop shadows; built from WillPower3309/swayfx 0.5.3 into ~/.local/bin/swayfx
      default: true
      requires: [desktop_sway]
      install_tools: true
      packages:
        - meson
        - ninja-build
        - pkg-config
        - cmake
        - git
        - scdoc
        - wayland-protocols
        - libwayland-dev
        - libpcre2-dev
        - libjson-c-dev
        - libpango1.0-dev
        - libcairo2-dev
        - libgdk-pixbuf-2.0-dev
        - libdrm-dev
        - libgbm-dev
        - libinput-dev
        - libseat-dev
        - libxkbcommon-dev
        - libxcb-dri3-dev
        - libxcb-present-dev
        - libxcb-res0-dev
        - libxcb-render-util0-dev
        - libxcb-ewmh-dev
        - libxcb-icccm4-dev
        - libliftoff-dev
        - libdisplay-info-dev
        - liblcms2-dev
        - libpixman-1-dev
        - libgles2-mesa-dev
        - libudev-dev
        - libevdev-dev
        - libmtdev-dev
        - libwacom-dev
    swappy:
      category: desktop
      label: swappy
      description: Wayland screenshot editor for grim/slurp; built into ~/.local/bin
      default: true
      requires: [desktop_sway]
      install_tools: true
      packages:
        - meson
        - ninja-build
        - libgtk-3-dev
        - libpango1.0-dev
        - libcairo2-dev
    kanshi:
      category: desktop
      label: kanshi
      default: true
      packages: [kanshi]
      config_paths: [dot_config/kanshi]
    wayland_session:
      category: desktop
      label: Wayland session helpers
      default: true
      config_paths: [dot_config/environment.d/wayland.conf]
    kitty:
      category: desktop
      label: Kitty terminal
      default: true
      install_tools: true
      description: Installed via sw.kovidgoyal.net installer into ~/.local/kitty.app; kitty/kitten linked in ~/.local/bin
      config_paths: [dot_config/kitty]
    dunst:
      category: desktop
      label: dunst notifications
      default: true
      packages: [dunst]
    rofi:
      category: desktop
      label: rofi + bemenu launchers
      default: true
      packages: [rofi, bemenu, libbemenu-wayland, j4-dmenu-desktop]
      config_paths: [dot_config/rofi]
      description: bemenu ($mod+d drun via j4-dmenu-desktop) is a horizontal full-width top bar; rofi handles $mod+z run mode
    desktop_utils:
      category: desktop
      label: Desktop utilities
      description: brightness, playerctl, network, audio
      default: true
      packages: [playerctl, brightnessctl, acpi, libnotify-bin, network-manager, network-manager-gnome, pulseaudio]
    dropbox:
      category: desktop
      label: Dropbox
      description: Official .deb from linux.dropbox.com; libayatana-appindicator3-1, python3-gi/gpg for CLI; autostart via systemd user unit
      default: false
      packages: [libayatana-appindicator3-1, python3-gi, python3-gpg]
    sunshine:
      category: desktop
      label: Sunshine (Moonlight host)
      description: Official LizardByte .deb from GitHub releases; game streaming host for Moonlight; autostart via systemd user unit
      default: true
      requires: [desktop_sway]
      config_paths: [dot_config/sunshine]
    keyd:
      category: desktop
      label: keyd key remapping
      description: Caps→Escape and Alt+hjkl navigation via keyd
      default: true
      packages: [keyd]
      system_deploy: keyd
      systemd_unit: keyd.service

    # --- dev ---
    neovim:
      category: dev
      label: Neovim
      default: true
      packages: [neovim]
      description: Linux uses official v0.12.3 tarball in ~/.local/opt via run_onchange_after_install-neovim; apt neovim is a fallback
      config_paths: [dot_config/nvim]
      external: .config/nvim/brighten
    cursor:
      category: dev
      label: Cursor
      default: true
      packages: [jq]
      description: Linux installs the dev/Nightly AppImage from Cursor's update API into ~/.local/opt/cursor-dev; cursor is linked in ~/.local/bin and cursor:// OAuth callbacks are registered via cursor-url-handler.desktop
      config_paths: [dot_config/Cursor, dot_config/cursor]
    gh_cli:
      category: dev
      label: GitHub CLI
      default: true
      packages: [gh]
    glab:
      category: dev
      label: GitLab CLI
      default: true
      packages: [glab]
    docker:
      category: dev
      label: Docker
      default: true
      description: Installed via get.docker.com when missing; skips if docker-ce is already present
      systemd_unit: docker.service
    clang:
      category: dev
      label: Clang toolchain
      default: true
      packages: [clang]
      zshrc_block: clang_exports
    unreal:
      category: dev
      label: Unreal Engine Neovim support
      description: UnrealEngine.nvim, clangd LSP, and GDB pretty-printers for UE debugging
      default: false
      requires: [neovim, clang]
      packages: [clangd]
      config_paths: [dot_config/nvim/lua/plugins/unreal.lua]
    ffmpeg:
      category: dev
      label: ffmpeg
      default: true
      packages: [ffmpeg]
    diff_so_fancy:
      category: dev
      label: diff-so-fancy
      default: true
      install_tools: true
      description: Git pager helper; release binary in ~/.local/bin (v1.4.10)
    flatpak:
      category: dev
      label: Flatpak
      default: true
      packages: [flatpak]

    # --- system ---
    ssh_hardening:
      category: system
      label: SSH hardening (port 9701 pubkey-only)
      default: true
      packages: [openssh-server]
      system_deploy: ssh
    grub:
      category: system
      label: GRUB config
      default: true
      packages: [grub-common, grub-efi-amd64, grub-efi-amd64-signed]
      system_deploy: grub
    displays_resume:
      category: system
      label: displays-resume sleep hook
      default: true
      system_deploy: displays_resume
    llama:
      category: system
      label: llama.cpp + llama-swap LLM service
      default: true
      description: systemd unit + pinned Hugging Face GGUF downloads on chezmoi apply
      system_deploy: llama
      systemd_unit: llama-swap.service
    earlyoom:
      category: system
      label: earlyoom
      default: true
      packages: [earlyoom]
      systemd_unit: earlyoom.service
    thermald:
      category: system
      label: thermald
      default: true
      packages: [thermald]
      systemd_unit: thermald.service
