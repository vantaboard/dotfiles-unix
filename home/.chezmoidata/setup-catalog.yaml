# Source of truth for scripts/dotfiles-setup. Maps feature ids to packages, externals, and config blocks.
setup_catalog:
  categories:
    - id: shell_core
      label: Core shell
      description: Essential CLI tools (always enabled)
      required: true
      default: true
    - id: shell_extras
      label: Shell extras
      description: zoxide, eza, bat, vivid, mise toolchain
      default: true
    - id: zsh_stack
      label: Zsh plugins and externals
      description: Oh My Zsh, Powerlevel10k, fzf-tab, abbreviations
      default: true
    - id: desktop
      label: Desktop / i3 + Sway
      description: i3, Sway, picom, kitty, autorandr, kanshi, display tooling
      default: true
    - id: dev
      label: Development
      description: Neovim, gh, glab, docker, clang
      default: true
    - id: system
      label: System services
      description: SSH hardening, GRUB, udev, systemd units
      default: true

  features:
    # --- shell_core (required) ---
    zsh:
      category: shell_core
      label: Zsh
      default: true
      required: true
      packages: [zsh]
    git:
      category: shell_core
      label: Git
      default: true
      required: true
      packages: [git]
    fzf:
      category: shell_core
      label: fzf
      default: true
      packages: [fzf]
      external: .fzf
      zshrc_bundle: fzf.zsh
      description: Git external for shell integration; run_after_install-fzf syncs ~/.fzf/bin with the repo
    ripgrep:
      category: shell_core
      label: ripgrep
      default: true
      packages: [ripgrep]
    fd:
      category: shell_core
      label: fd-find
      default: true
      packages: [fd-find]
    trash_cli:
      category: shell_core
      label: trash-cli
      default: true
      install_tools: true
      description: Git clone + Python venv; trash-* wrappers in ~/.local/bin
    xclip:
      category: shell_core
      label: xclip
      default: true
      packages: [xclip]
    keychain:
      category: shell_core
      label: keychain
      default: true
      packages: [keychain]
    jq:
      category: shell_core
      label: jq
      default: true
      packages: [jq]
    htop:
      category: shell_core
      label: htop
      default: true
      packages: [htop]
    tmux:
      category: shell_core
      label: tmux
      default: true
      packages: [tmux]

    # --- shell_extras ---
    zoxide:
      category: shell_extras
      label: zoxide
      description: Smarter cd (apt or cargo)
      default: true
      packages: [zoxide]
      zshrc_block: zoxide
    eza:
      category: shell_extras
      label: eza
      default: true
      packages: [eza]
    bat:
      category: shell_extras
      label: bat
      default: true
      packages: [bat]
    vivid:
      category: shell_extras
      label: vivid
      description: LS_COLORS via vivid dracula; .deb on Linux, pkg on Termux (install-tools)
      default: true
      export_block: vivid
      install_tools: true
    mise:
      category: shell_extras
      label: mise
      description: Runtime version manager (Termux pkg on Android; mise.run on Linux)
      default: true
      install_tools: true
      zshrc_block: mise
    direnv:
      category: shell_extras
      label: direnv
      default: true
      packages: [direnv]

    # --- zsh_stack ---
    oh_my_zsh:
      category: zsh_stack
      label: Oh My Zsh
      default: true
      external: .oh-my-zsh
      zshrc_block: oh_my_zsh
    p10k:
      category: zsh_stack
      label: Powerlevel10k
      default: true
      requires: [oh_my_zsh]
      external: .oh-my-zsh/custom/themes/powerlevel10k
      zshrc_block: p10k
    zsh_autosuggestions:
      category: zsh_stack
      label: zsh-autosuggestions
      default: true
      requires: [oh_my_zsh]
      external: .oh-my-zsh/custom/plugins/zsh-autosuggestions
      omz_plugin: zsh-autosuggestions
    zsh_completions:
      category: zsh_stack
      label: zsh-completions
      default: true
      requires: [oh_my_zsh]
      external: .oh-my-zsh/custom/plugins/zsh-completions
      zshrc_block: zsh_completions
    zsh_edit:
      category: zsh_stack
      label: zsh-edit
      default: true
      requires: [oh_my_zsh]
      external: .zshplugins/zsh-edit
      zshrc_block: zsh_edit
    fzf_tab:
      category: zsh_stack
      label: fzf-tab
      default: true
      requires: [fzf, oh_my_zsh]
      zshrc_block: fzf_tab
      install_tools: true
      description: Installed into OMZ custom/plugins via run_onchange_after_install-tools
    zsh_abbr:
      category: zsh_stack
      label: zsh-abbr
      default: true
      requires: [oh_my_zsh]
      zshrc_block: zsh_abbr
      install_tools: true
      description: Installed via run_onchange_after_install-tools; abbreviations in ~/.config/zsh-abbr/user-abbreviations
    omz_git:
      category: zsh_stack
      label: OMZ git plugin
      default: true
      requires: [oh_my_zsh]
      omz_plugin: git
    omz_fzf:
      category: zsh_stack
      label: OMZ fzf plugin
      default: false
      requires: [oh_my_zsh, fzf]
      omz_plugin: fzf
      description: Optional; redundant when using git-installed fzf (~/.fzf) via the fzf feature
    omz_ssh_agent:
      category: zsh_stack
      label: OMZ ssh-agent plugin
      default: true
      requires: [oh_my_zsh]
      omz_plugin: ssh-agent
    omz_python:
      category: zsh_stack
      label: OMZ python plugin
      default: true
      requires: [oh_my_zsh]
      omz_plugin: python
    omz_virtualenv:
      category: zsh_stack
      label: OMZ virtualenv plugin
      default: true
      requires: [oh_my_zsh]
      omz_plugin: virtualenv
    omz_extract:
      category: zsh_stack
      label: OMZ extract plugin
      default: true
      requires: [oh_my_zsh]
      omz_plugin: extract
    omz_codeclimate:
      category: zsh_stack
      label: OMZ codeclimate plugin
      default: true
      requires: [oh_my_zsh]
      omz_plugin: codeclimate
    gpg_signing:
      category: zsh_stack
      label: GPG signing via keychain
      default: true
      requires: [keychain]
      zshrc_block: gpg_keychain

    # --- desktop ---
    desktop_i3:
      category: desktop
      label: i3 window manager
      default: true
      packages: [i3, i3status]
      config_paths: [dot_config/i3, dot_config/i3status]
    desktop_sway:
      category: desktop
      label: Sway window manager
      default: true
      packages: [sway, swaylock, swayidle, swaybg, grim, slurp, wl-clipboard]
      config_paths: [dot_config/sway, dot_config/swaylock, dot_config/environment.d/wayland.conf]
      system_deploy: sway_session
    hyprpicker:
      category: desktop
      label: hyprpicker
      description: Wayland color picker; built from hyprwm/hyprpicker v0.3.0 into ~/.local/bin (gcc-14 on Ubuntu 24.04)
      default: true
      requires: [desktop_sway]
      install_tools: true
      packages:
        - cmake
        - pkg-config
        - libpango1.0-dev
        - libcairo2-dev
        - libwayland-dev
        - wayland-protocols
        - libxkbcommon-dev
        - libjpeg-dev
        - gcc-14
        - g++-14
    swappy:
      category: desktop
      label: swappy
      description: Wayland screenshot editor for grim/slurp; built into ~/.local/bin
      default: true
      requires: [desktop_sway]
      install_tools: true
      packages:
        - meson
        - ninja-build
        - libgtk-3-dev
        - libpango1.0-dev
        - libcairo2-dev
    kanshi:
      category: desktop
      label: kanshi
      default: true
      packages: [kanshi]
      config_paths: [dot_config/kanshi]
    wayland_session:
      category: desktop
      label: Wayland session helpers
      default: true
      config_paths: [dot_config/environment.d/wayland.conf]
    picom:
      category: desktop
      label: picom compositor
      default: true
      packages: [picom]
      config_paths: [dot_config/picom.conf]
    kitty:
      category: desktop
      label: Kitty terminal
      default: true
      description: Installed via sw.kovidgoyal.net installer into ~/.local/kitty.app; kitty/kitten linked in ~/.local/bin
      config_paths: [dot_config/kitty]
    dunst:
      category: desktop
      label: dunst notifications
      default: true
      packages: [dunst]
    autorandr:
      category: desktop
      label: autorandr
      default: true
      packages: [autorandr]
      config_paths: [dot_config/autorandr, dot_screenlayout]
      alias_block: autorandr
    nitrogen:
      category: desktop
      label: nitrogen wallpapers
      default: true
      packages: [nitrogen]
      config_paths: [dot_wallpapers]
    rofi:
      category: desktop
      label: rofi launcher
      default: true
      packages: [rofi]
    desktop_utils:
      category: desktop
      label: Desktop utilities
      description: scrot, feh, brightness, playerctl, etc.
      default: true
      packages: [scrot, feh, numlockx, xss-lock, playerctl, brightnessctl, acpi, notify-osd, libnotify-bin, xinput, x11-xserver-utils, xinit, xorg, network-manager, pulseaudio]
    x11_session:
      category: desktop
      label: X11 session files
      default: true
      config_paths: [dot_xinitrc, dot_xsessionrc, dot_Xresources]
    keyd:
      category: desktop
      label: keyd key remapping
      description: Caps→Escape and Alt+hjkl navigation via keyd
      default: true
      packages: [keyd]
      system_deploy: keyd
      systemd_unit: keyd.service

    # --- dev ---
    neovim:
      category: dev
      label: Neovim
      default: true
      packages: [neovim]
      config_paths: [dot_config/nvim]
      external: .config/nvim/brighten
    gh_cli:
      category: dev
      label: GitHub CLI
      default: true
      packages: [gh]
    glab:
      category: dev
      label: GitLab CLI
      default: true
      packages: [glab]
    docker:
      category: dev
      label: Docker
      default: true
      description: Installed via get.docker.com when missing; skips if docker-ce is already present
      systemd_unit: docker.service
    clang:
      category: dev
      label: Clang toolchain
      default: true
      packages: [clang]
      zshrc_block: clang_exports
    ffmpeg:
      category: dev
      label: ffmpeg
      default: true
      packages: [ffmpeg]
    diff_so_fancy:
      category: dev
      label: diff-so-fancy
      default: true
      install_tools: true
      description: Git pager helper; release binary in ~/.local/bin (v1.4.10)
    flatpak:
      category: dev
      label: Flatpak
      default: true
      packages: [flatpak]

    # --- system ---
    ssh_hardening:
      category: system
      label: SSH hardening (port 9701 pubkey-only)
      default: true
      packages: [openssh-server]
      system_deploy: ssh
    grub:
      category: system
      label: GRUB config
      default: true
      packages: [grub-common, grub-efi-amd64, grub-efi-amd64-signed]
      system_deploy: grub
    udev_dock:
      category: system
      label: Dock hotplug udev rules
      default: true
      packages: [udev]
      system_deploy: udev
    displays_resume:
      category: system
      label: displays-resume systemd unit
      default: true
      system_deploy: displays_resume
      systemd_unit: displays-resume.service
    ollama:
      category: system
      label: Ollama LLM service
      default: true
      system_deploy: ollama
      systemd_unit: ollama.service
    earlyoom:
      category: system
      label: earlyoom
      default: true
      packages: [earlyoom]
      systemd_unit: earlyoom.service
    thermald:
      category: system
      label: thermald
      default: true
      packages: [thermald]
      systemd_unit: thermald.service
