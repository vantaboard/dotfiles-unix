packages:
  ubuntu:
    # Never install via apt — use run_onchange_after_install-kitty.sh instead
    apt_exclude:
      - kitty
      # xrandr hotplug tool; conflicts with kanshi on sway Wayland (never install).
      - autorandr
    apt:
      # Shell and core CLI
      - zsh
      - git
      - curl
      - sudo
      - keychain
      - fzf
      - ripgrep
      - fd-find
      - clang
      - jq
      - htop
      - fastfetch
      - tmux
      - direnv
      # Desktop (Sway/Wayland; installed on real machines; harmless in CI)
      - sway
      - swaylock
      - swayidle
      - swaybg
      - waybar
      - kanshi
      - grim
      - slurp
      - wl-clipboard
      - py3status
      - dunst
      - rofi
      - bemenu
      - libbemenu-wayland
      - j4-dmenu-desktop
      - playerctl
      - brightnessctl
      - acpi
      - libnotify-bin
      - keyd
      - network-manager
      - network-manager-gnome
      - pulseaudio
      - flatpak
      # Editors and dev tools
      - neovim
      - gh
      - glab
      - ffmpeg
      # System services
      - openssh-server
      - grub-common
      - grub-efi-amd64
      - grub-efi-amd64-signed
      - systemd
      - udev
      - earlyoom
      - thermald
      # VPN packages omitted — configure manually (see docs/vpn-setup.md)
    apt_ci:
      # Minimal set for Docker E2E (shell + smoke test)
      - zsh
      - git
      - curl
      - sudo
      - keychain
      - fzf
      - ripgrep
      - fd-find
      - trash-cli
      - wl-clipboard
      - vivid
      - clang
      - jq
      - neovim
      - openssh-server
      - systemd
      - zoxide
      - eza
      - bat
  termux:
    pkg:
      # Installed via apt full-upgrade + apt install on Android (see run_onchange_before_install-packages).
      - bash
      - zsh
      - git
      - curl
      - openssh
      - keychain
      - fzf
      - ripgrep
      - fd
      - bat
      - eza
      - zoxide
      - jq
      - htop
      - tmux
      - direnv
      - neovim
      - make
      - clang
      - cmake
      - gh
      - python
      - vivid
      - termux-api
