# On s2idle-only laptops the NVIDIA driver leaves S0ix power management off
# even when the GPU reports platform support. Without it, VRAM is not restored
# correctly on wake: nvidia-modeset rejects every surface registration
# ("planePitch or rmObjectSizeInBytes" errors), sway's atomic commits fail,
# and all outputs stay black until a VT switch forces a fresh modeset.
# See https://github.com/NVIDIA/open-gpu-kernel-modules/issues/1136
options nvidia NVreg_EnableS0ixPowerManagement=1
